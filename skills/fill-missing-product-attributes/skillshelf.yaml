input_schema:
  required:
    - Shopify product CSV (native Admin export format)
  recommended:
    - CSV re-exported with Google Shopping columns included
    - Python 3.10+ with code execution enabled

output_schema:
  format: Three files
  sections:
    - Corrected Shopify CSV ready for re-import (<stem>-filled.csv)
    - Change log CSV with confidence scores and evidence per fill (change_log.csv)
    - Needs-review CSV listing rows that could not be filled with confidence (needs_review.csv)

faq:
  - question: What does this skill do?
    answer: >-
      It scans a Shopify apparel CSV for rows missing color, size, material,
      gender, and age_group values, infers them from option values, tags, and
      product titles, and produces a corrected CSV plus a change log and a
      needs-review file. Nothing is ever overwritten — only blank fields are
      filled.
  - question: What input does it need?
    answer: >-
      A Shopify product CSV exported from Shopify Admin. The CSV must include
      Google Shopping columns for the fills to land anywhere. Python 3.10+
      with code execution is required. The skill cannot run without the
      detection script.
  - question: Will it change my SKUs, prices, or option values?
    answer: >-
      No. The skill only writes to Google Shopping metafield columns. Option
      values, SKUs, prices, and inventory are never touched. Changing option
      values would break variant IDs and inventory sync, so that constraint is
      absolute.
  - question: What happens to products it cannot fill?
    answer: >-
      They appear in needs_review.csv with a reason code and any available
      evidence. Nothing is written to those rows. You can inspect them
      manually or re-run the skill after adding more product data.
  - question: Does it work on non-apparel products?
    answer: >-
      No. The skill gates on Product Category, then the Type column, then
      high-signal title tokens. Products with no apparel signal in any of
      those three tiers are skipped and listed in the audit report. Non-apparel
      attributes are not inferred.
