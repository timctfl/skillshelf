# JSON Schema for the map-pdp-structure skill's structured output.
# Loaded by the platform when the skill's execution config declares
# `output.schema: skill`. The LLM's final response must validate against
# this schema.
#
# Uses JSON Schema draft 2020-12 expressed in YAML.

$schema: https://json-schema.org/draft/2020-12/schema
title: PDP Content Template
description: >-
  Structured template describing a Shopify store's product detail page.
  Each section maps to a Shopify standard field, metafield, or external
  source. The shopify_assembly block describes how sections combine
  back into body_html on write-back.

type: object
additionalProperties: false
required:
  - type
  - generated_from_product
  - generated_at
  - sections
  - shopify_assembly

properties:
  type:
    const: product-detail-page
    description: "Template type identifier. Always 'product-detail-page' for this skill."

  generated_from_product:
    type: string
    format: uri
    description: "URL of the reference product this template was generated from."

  generated_at:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of template generation."

  sections:
    type: array
    minItems: 1
    description: >-
      Visible PDP sections, in the order they appear on the page. Each section
      must map to a source (standard Shopify field, metafield, or external).
    items:
      $ref: "#/$defs/section"

  shopify_assembly:
    type: object
    additionalProperties: false
    description: >-
      Describes how section content combines into Shopify write-back targets.
      body_html reconstruction uses the keys, order, and wrappers declared here.
    required: [body_html]
    properties:
      body_html:
        type: array
        description: >-
          Ordered list of section keys that contribute to body_html, each with
          its HTML wrapper. Empty array is valid (body_html is not managed by
          this template).
        items:
          $ref: "#/$defs/assembly_step"

$defs:
  section:
    type: object
    additionalProperties: false
    required: [name, key, source, classification, format, guidance]
    properties:
      name:
        type: string
        minLength: 1
        description: "Human-readable section name as shown on the PDP."
      key:
        type: string
        pattern: "^[a-z][a-z0-9_]*$"
        description: >-
          Snake_case identifier used by downstream skills and shopify_assembly.
          Must be unique across sections.
      source:
        enum: [shopify_standard, shopify_metafield, external]
        description: >-
          Where this section's content originates.
          shopify_standard: a standard Shopify product field (title, description,
            seo.title, seo.description, etc.).
          shopify_metafield: a metafield on the product.
          external: theme setting, app block, or other content not tied to
            Shopify product data (SkillShelf will not manage it).
      shopify_metafield:
        type: string
        pattern: "^[a-z_][a-z0-9_]*\\.[a-z_][a-z0-9_]*$"
        description: >-
          Required when source is shopify_metafield. Format: `namespace.key`
          (e.g., `custom.ingredients`).
      metafield_type:
        type: string
        description: >-
          Shopify metafield type (e.g., single_line_text_field,
          multi_line_text_field, rich_text_field, json, list.single_line_text_field).
          Required when source is shopify_metafield.
      source_detail:
        type: string
        description: >-
          Required when source is external. Brief note explaining where the
          content comes from (e.g., "theme section", "Yotpo reviews app block").
      classification:
        enum: [dynamic, static]
        description: >-
          dynamic: content regenerated per product by downstream skills.
          static: content is consistent across products; excluded from skill
            runs unless explicitly requested.
      format:
        enum: [plain_text, html, list]
        description: "Expected content format for this section."
      length:
        type: object
        additionalProperties: false
        description: "Optional length constraints for downstream content generation."
        properties:
          min:
            type: integer
            minimum: 0
          max:
            type: integer
            minimum: 1
          unit:
            enum: [words, characters]
        required: [unit]
      guidance:
        type: string
        minLength: 1
        description: >-
          One-sentence instruction to downstream content-generation skills
          explaining what this section should contain and how it should read.
    allOf:
      - if:
          properties:
            source:
              const: shopify_metafield
        then:
          required: [shopify_metafield, metafield_type]
      - if:
          properties:
            source:
              const: external
        then:
          required: [source_detail]

  assembly_step:
    type: object
    additionalProperties: false
    required: [key, wrapper]
    properties:
      key:
        type: string
        description: "Section key (must match one of the sections[].key values)."
      wrapper:
        enum: [none, h2_heading, h3_heading, paragraph, list]
        description: >-
          How the section's content is wrapped during body_html assembly.
          none: content appears as-is.
          h2_heading / h3_heading: preceded by a heading (requires `heading`).
          paragraph: wrapped in <p></p>.
          list: rendered as a bullet list (content expected to be list format).
      heading:
        type: string
        description: "Required when wrapper is h2_heading or h3_heading."
    allOf:
      - if:
          properties:
            wrapper:
              enum: [h2_heading, h3_heading]
        then:
          required: [heading]
