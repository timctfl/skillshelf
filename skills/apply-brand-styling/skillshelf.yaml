faq:
  - question: Does this skill rewrite any of my text?
    answer: >-
      No. It only changes fonts, colors, heading levels, and structural
      formatting. All of your original text stays exactly as-is.
  - question: What brand file formats does it accept?
    answer: >-
      It works best with the output of the Brand Guidelines Extractor,
      but it also accepts style guide PDFs, brand books, or any document
      that defines your colors and typography.
  - question: Can it brand a PDF?
    answer: >-
      PDFs can't be restyled directly. The skill will explain the
      tradeoffs and let you choose between converting to a branded
      Word doc or getting a checklist of changes to apply in the
      original design tool.
