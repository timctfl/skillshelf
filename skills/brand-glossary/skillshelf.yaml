author:
  name: Tim Petrella
conversation_starter: |
  What's your brand name and website URL? I'll document how your brand talks about its products, including approved terms, words to avoid, and category-specific vocabulary.

  Share anything that reflects your brand's terminology: style guides, product copy, Shopify exports, FAQ pages, customer service scripts, or existing glossaries. You can paste text, upload files, or share screenshots at any point.

faq:
  - question: What is a brand glossary?
    answer: >-
      A structured reference document that defines your brand's approved
      terminology, terms to avoid, internal jargon translations, and branded
      term styling rules. It ensures every piece of content uses the same
      language, whether written by a person or generated by AI.
  - question: What input do I need to get started?
    answer: >-
      Anything that reflects how your brand talks about its products. A style
      guide is ideal, but product copy from your website, FAQ pages, customer
      service templates, or even a partial list of terms you've been tracking
      informally all work. The skill fills in gaps with targeted questions.
  - question: How does this work with other skills?
    answer: >-
      The brand glossary is a foundation document. When you use content
      generation skills (rewriting product copy, writing emails, generating
      tags), upload the glossary alongside your other brand documents. The
      skill will follow your terminology rules automatically.
  - question: What if my terminology changes over time?
    answer: >-
      Run the skill again with your existing glossary as a starting point.
      It will preserve what's already documented and focus on updating or
      expanding the areas you flag.
