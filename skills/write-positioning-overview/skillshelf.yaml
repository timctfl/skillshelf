conversation_starter: |
  What's your brand name and website URL? I'll start by pulling positioning-relevant content from your site (homepage, about page, product pages, mission and values).

  After that, share anything the site doesn't capture: internal brand guidelines, notes on positioning strengths or weaknesses, customer or competitor context, or output from the Research Your Competitors or Build a Customer Profile skills.

faq:
  - question: What does the Write a Positioning Brief skill do?
    answer: It takes your brand name and website URL, reviews your public-facing content, then combines that with whatever additional context you provide to produce a structured positioning brief covering your positioning statement, target audience, differentiators, competitive context, and anti-positioning.
  - question: What if I don't have much brand material to start with?
    answer: The skill works with whatever you have. If you have a website, the agent will pull content from it directly. If you don't, a short conversation about what you sell and who you sell to is enough to get started. The confidence summary at the end will flag which areas are thin and what would strengthen them.
  - question: Do I need technical skills to use this?
    answer: No. This is a beginner-level skill that works through a guided conversation. You provide your brand name and URL, the AI does the initial research, and you fill in whatever the site doesn't capture.
  - question: How is this different from just asking AI to write a positioning statement?
    answer: A one-off prompt gives you a generic paragraph. This skill produces a structured brief with named dimensions (positioning statement, problem, audience, differentiators, competitive context, anti-positioning) that other skills and tools can reference. It's a durable foundation document, not a throwaway answer.
  - question: How does this relate to the other foundation skills?
    answer: The positioning brief defines what you say. The brand voice guide (from the Document Your Brand Voice skill) defines how you say it. The competitor overview (from the Research Your Competitors skill) feeds into the competitive context section. Together they give downstream content skills a complete foundation to work from.
