version: "1.0"

category: reporting-and-analysis

level: advanced
primitive: false
model_tier: premium

platforms:
  - shopify

tags:
  - acquisition
  - retention
  - sku-analysis
  - shopify
  - orders-export
  - merchandising
  - performance-analysis
  - customer-lifetime-value
  - repeat-purchase
  - paid-acquisition

subcategories:
  - customer-lifetime-value
  - merchandising-strategy
  - shopify-analytics

input_schema:
  required:
    - Shopify Orders export CSV
  recommended:
    - Shopify Products export CSV
  optional:
    - Product category (e.g., skincare, apparel, supplements)
    - Repurchase window in days

output_schema:
  format: Markdown report
  sections:
    - Analysis Summary
    - Product Role Map
    - Category Breakdown (requires Products CSV)
    - Acquisition Anchors
    - Retention Drivers
    - Products to Watch
    - Merchandising Brief
    - Confidence Notes

date_added: "2026-04-29"
date_updated: "2026-04-29"

